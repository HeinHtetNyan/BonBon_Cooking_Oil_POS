name: bonbon-pos
services:
  postgres:
    image: postgres:16-alpine
    container_name: bonbon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bonbon_oil_db}
      POSTGRES_USER: ${POSTGRES_USER:-bonbon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bonbon_user} -d ${POSTGRES_DB:-bonbon_oil_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bonbon_net

  redis:
    image: redis:7-alpine
    container_name: bonbon_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bonbon_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: bonbon-oil-backend
    container_name: bonbon_api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bonbon_net
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app
      --log-level debug

  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: bonbon_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-bonbon_oil_db}
      - POSTGRES_USER=${POSTGRES_USER:-bonbon_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev_password}
      - SCHEDULE=@hourly
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=3
      - HEALTHCHECK_PORT=8080
    networks:
      - bonbon_net

  backup-uploader:
    image: rclone/rclone:latest
    container_name: bonbon_backup_uploader
    restart: unless-stopped
    volumes:
      - ./backups:/backups:ro
      - ./scripts/rclone-sync.sh:/rclone-sync.sh:ro
      - ./logs:/logs
    depends_on:
      - db-backup
    environment:
      - RCLONE_CONFIG_R2_TYPE=s3
      - RCLONE_CONFIG_R2_PROVIDER=Cloudflare
      - RCLONE_CONFIG_R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - RCLONE_CONFIG_R2_ENDPOINT=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      - R2_BUCKET=${R2_BUCKET}
    entrypoint: ["/bin/sh", "/rclone-sync.sh"]
    networks:
      - bonbon_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bonbon_net:
    driver: bridge
