services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: bonbon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bonbon_oil_db}
      POSTGRES_USER: ${POSTGRES_USER:-bonbon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bonbon_user} -d ${POSTGRES_DB:-bonbon_oil_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bonbon_net

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: bonbon_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bonbon_net

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bonbon_api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
      - /app/.venv  # exclude venv from bind mount
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bonbon_net
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app
      --log-level debug

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bonbon_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bonbon_net
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --queues=default,high_priority,reports

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bonbon_beat
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - worker
    networks:
      - bonbon_net
    command: >
      celery -A app.workers.celery_app:celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule=/tmp/celerybeat-schedule

  # Flower (Celery monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bonbon_flower
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    depends_on:
      - worker
    networks:
      - bonbon_net
    command: >
      celery -A app.workers.celery_app:celery_app flower
      --port=5555

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bonbon_net:
    driver: bridge
